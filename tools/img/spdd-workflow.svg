
<svg class = 'nodearc overall' id = '' version = '1.1' viewBox = '-3 -3 800 550' xmlns = 'http://www.w3.org/2000/svg'>
<style>@import url(https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,300,400,600,700,800);

svg.nodearc.overall {
  --default-fill: #F7F8FE;
  --default-stroke: #0f1872;
  --legend: #ef5ba1;
  --dash-stroke: 3,3;
  path {
    stroke: var(--default-stroke);
    fill: none; 
    stroke-width: 1.5;
  }
  .na-node {
    * {
      fill: var(--default-fill);
      stroke: var(--default-stroke);
      stroke-width: 2;
    }
  }

  
  foreignObject {
    overflow: visible;
    line-height: 1.1;
    font-family: Open Sans, sans-serif;
    font-size: 8pt;
  }
  
  p {
    margin: 0;
  }

  .na-node .label-center &gt; div {
    display: table;
    height: 100%;
    width: 100%;
    &amp; &gt; * {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
      padding: 2px;
    }
  }

  .na-surround {
    rect {
      fill: #eeeeee;
      stroke: grey;
      stroke-width: 1.5;
    }
    div {
      padding: 3px;
      font-size: 7pt;
    }
  }


  .legend {
    font-style: italic;
    color: var(--legend);
  }

  path.legend-line {
    stroke: var(--legend)
  }
}

svg.nodearc.overall.overall{.flow_start {fill: var(--default-stroke)}}
svg.nodearc.overall.overall{.flow_target path {fill: var(--default-stroke)}}
svg.nodearc.overall.overall {
  --doc-stroke: Tan;
  --doc-dash: 10 5;
  .doc path, .person path {
    fill: none ;
    stroke-dasharray: var(--doc-dash);
    stroke: var(--doc-stroke);
  }

  .git_db {
    color: var(--doc-stroke);
    text-align: center;
    path {
      fill: var(--doc-stroke);
    }
  }


  .doc {
    color: var(--doc-stroke);
  }


  .create, .read, .rw, .database_cyl path {
    stroke-dasharray: var(--doc-dash);
    stroke: var(--doc-stroke);
  }

  .core_skill {
    rect {
      fill: green;
      stroke: none;
    }
    div {
      color: white;
    }


  }


}
</style>

