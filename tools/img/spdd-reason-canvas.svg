</foreignObject>

<g class = 'flow-arc na-arc'>
<path class = 'flow-arc na-arc line' d = 'M 650 140.0 L 700 140.0'></path>

<path class = 'flow-arc na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(0.0, 700, 140.0)translate(700 140.0)'></path>
</g>

<foreignObject class = 'na-text title' height = '30' nid = 'title' width = '300' x = '305.0' y = '25'>
<div xmlns = 'http://www.w3.org/1999/xhtml'>SPDD REASONS Canvas</div>
</foreignObject>
</svg>
