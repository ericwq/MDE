<foreignObject class = 'label-center' height = '80' width = '130' x = '50' y = '100'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Requirements<br/><br/>Describe the essence of<br/>the requirements clearly<br/>in one sentence</p></div>
</foreignObject>
</g>

<g class = 'abstraction-box na-node' nid = 'entities'>
<rect class = 'abstraction-box' height = '80' width = '130' x = '200' y = '100.0'></rect>

<foreignObject class = 'label-center' height = '80' width = '130' x = '200' y = '100.0'>
