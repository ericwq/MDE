
<svg class = 'nodearc reason-canvas' id = '' version = '1.1' viewBox = '0 0 910 420' xmlns = 'http://www.w3.org/2000/svg'>
<style>@import url(https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,300,400,600,700,800);

svg.nodearc.reason-canvas {
  --default-fill: #F7F8FE;
  --default-stroke: #0f1872;
  --legend: #ef5ba1;
  --dash-stroke: 3,3;
  path {
    stroke: var(--default-stroke);
    fill: none; 
    stroke-width: 1.5;
  }
  .na-node {
    * {
      fill: var(--default-fill);
      stroke: var(--default-stroke);
      stroke-width: 2;
    }
  }

  
  foreignObject {
    overflow: visible;
    line-height: 1.1;
    font-family: Open Sans, sans-serif;
    font-size: 8pt;
  }
  
  p {
    margin: 0;
  }

  .na-node .label-center &gt; div {
    display: table;
    height: 100%;
    width: 100%;
    &amp; &gt; * {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
      padding: 2px;
    }
  }

  .na-surround {
    rect {
      fill: #eeeeee;
      stroke: grey;
      stroke-width: 1.5;
    }
    div {
      padding: 3px;
      font-size: 7pt;
    }
  }


  .legend {
    font-style: italic;
    color: var(--legend);
  }

  path.legend-line {
    stroke: var(--legend)
  }
}

svg.nodearc.reason-canvas.reason-canvas{.flow_start {fill: var(--default-stroke)}}
svg.nodearc.reason-canvas.reason-canvas{.flow_target path {fill: var(--default-stroke)}}svg.nodearc.reason-canvas.reason-canvas .title {
  font-size: 14px;
  text-align: center;
}


svg.nodearc.reason-canvas.reason-canvas .abstraction-box {
  fill: #cce5ff;
  stroke: #4a90d9;
}

svg.nodearc.reason-canvas.reason-canvas .specific-box {
  fill: #c8e6c9;
  stroke: #4caf50;
}

svg.nodearc.reason-canvas.reason-canvas .common-task-box {
  fill: #ffcc80;
  stroke: #f57c00;
}

svg.nodearc.reason-canvas.reason-canvas .constraint-box {
  fill: #ef9a9a;
  stroke: #e53935;
}

svg.nodearc.reason-canvas.reason-canvas .main-area {
  fill: #fffde7;
  stroke: #fbc02d;
  stroke-width: 2;
}

svg.nodearc.reason-canvas.reason-canvas .common-area {
  fill: #e8f5e9;
  stroke: #81c784;
  stroke-width: 2;
}

svg.nodearc.reason-canvas.reason-canvas .abstraction-area {
  fill: #e3f2fd;
  stroke: #90caf9;
}

svg.nodearc.reason-canvas.reason-canvas .specific-area {
  fill: #e8f5e9;
  stroke: #a5d6a7;
}

svg.nodearc.reason-canvas.reason-canvas .flow-label {
  font-size: 10px;
  font-style: italic;
}

svg.nodearc.reason-canvas.reason-canvas .flow-arc {
  stroke: #f9a825;
  stroke-width: 2;
}

svg.nodearc.reason-canvas.reason-canvas .flow-arc .end-marker {
  fill: #f9a825;
}

svg.nodearc.reason-canvas.reason-canvas .dashed-yellow {
  stroke: #f9a825;
  stroke-dasharray: 6 4;
}

svg.nodearc.reason-canvas.reason-canvas .dashed-yellow .end-marker {
  fill: #f9a825;
}

svg.nodearc.reason-canvas.reason-canvas .dashed-red {
  stroke: #e53935;
  stroke-dasharray: 6 4;
}

svg.nodearc.reason-canvas.reason-canvas .dashed-red .end-marker {
  fill: #e53935;
}

</style>

<g class = 'na-surround' nid = 'main_area'>
<rect class = 'main-area' height = '170' width = '900' x = '5' y = '55'></rect>

<foreignObject class = 'label-tl' height = '170' width = '900' x = '5' y = '55'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Main Area</p></div>
</foreignObject>
</g>

<g class = 'na-surround' nid = 'abstraction_parts'>
<rect class = 'abstraction-area' height = '120' width = '620' x = '30' y = '80'></rect>

<foreignObject class = 'label-tl' height = '120' width = '620' x = '30' y = '80'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Abstraction Parts</p></div>
</foreignObject>
</g>

<g class = 'na-surround' nid = 'specific_parts'>
<rect class = 'specific-area' height = '120.0' width = '180' x = '700' y = '80.0'></rect>

<foreignObject class = 'label-tl' height = '120.0' width = '180' x = '700' y = '80.0'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Specific Parts</p></div>
</foreignObject>
</g>

<g class = 'na-surround' nid = 'common_standard_parts'>
<rect class = 'common-area' height = '130' width = '600' x = '115' y = '290'></rect>

<foreignObject class = 'label-tl' height = '130' width = '600' x = '115' y = '290'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Common Standard Parts</p></div>
</foreignObject>
</g>

