<foreignObject class = 'label-center' height = '80' width = '130' x = '500' y = '100.0'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Structure<br/><br/>Define inheritance<br/>relationships and<br/>dependence</p></div>
</foreignObject>
</g>

<g class = 'flow-arc na-arc'>
<path class = 'flow-arc na-arc line' d = 'M 180 140.0 L 200 140.0'></path>

<path class = 'flow-arc na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(0.0, 200, 140.0)translate(200 140.0)'></path>
</g>

<g class = 'flow-arc na-arc'>
<path class = 'flow-arc na-arc line' d = 'M 330 140.0 L 350 140.0'></path>

<path class = 'flow-arc na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(0.0, 350, 140.0)translate(350 140.0)'></path>
</g>

<g class = 'flow-arc na-arc'>
<path class = 'flow-arc na-arc line' d = 'M 480 140.0 L 500 140.0'></path>

<path class = 'flow-arc na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(0.0, 500, 140.0)translate(500 140.0)'></path>
</g>

<g class = 'specific-box na-node' nid = 'operations'>
<rect class = 'specific-box' height = '80' width = '140' x = '720' y = '100.0'></rect>

<foreignObject class = 'label-center' height = '80' width = '140' x = '720' y = '100.0'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Operations<br/><br/>Decompose abstraction<br/>tasks into concrete,<br/>reviewable,<br/>executable tasks</p></div>
</foreignObject>
</g>

<g class = 'common-task-box na-node' nid = 'norms'>
<rect class = 'common-task-box' height = '70' width = '180' x = '145' y = '320'></rect>

<foreignObject class = 'label-center' height = '70' width = '180' x = '145' y = '320'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Norms<br/><br/>Cross-practice, best practice and etc.</p></div>
</foreignObject>
</g>

<g class = 'constraint-box na-node' nid = 'safeguards'>
<rect class = 'constraint-box' height = '70' width = '160' x = '525' y = '320.0'></rect>

<foreignObject class = 'label-center' height = '70' width = '160' x = '525' y = '320.0'>
<div xmlns = 'http://www.w3.org/1999/xhtml'><p>Safeguards<br/><br/>Governance guardrails</p></div>
</foreignObject>
</g>

<g class = 'dashed-yellow na-arc'>
<path class = 'dashed-yellow na-arc line' d = 'M 235.0 320 L 235.0 225'></path>

<path class = 'dashed-yellow na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(-90.0, 235.0, 225)translate(235.0 225)'></path>
</g>

<foreignObject class = 'na-text flow-label' height = '50' width = '100' x = '160.0' y = '260'>
<div xmlns = 'http://www.w3.org/1999/xhtml'>Cross, applies to<br/>all sections</div>
</foreignObject>

<g class = 'dashed-red na-arc'>
<path class = 'dashed-red na-arc line' d = 'M 605.0 320.0 L 605.0 225.0'></path>

<path class = 'dashed-red na-arc end-marker' d = 'M 0 0 l -12 -5 m 12 5 l -12 5' transform = 'rotate(-90.0, 605.0, 225.0)translate(605.0 225.0)'></path>
</g>

<foreignObject class = 'na-text flow-label' height = '50' width = '100' x = '610.0' y = '260.0'>
