
<svg class = 'nodearc spdd-overview' id = '' version = '1.1' viewBox = '0 0 600 310' xmlns = 'http://www.w3.org/2000/svg'>
<style>@import url(https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,300,400,600,700,800);

svg.nodearc.spdd-overview {
  --default-fill: #F7F8FE;
  --default-stroke: #0f1872;
  --legend: #ef5ba1;
  --dash-stroke: 3,3;
  path {
    stroke: var(--default-stroke);
    fill: none; 
    stroke-width: 1.5;
  }
  .na-node {
    * {
      fill: var(--default-fill);
      stroke: var(--default-stroke);
      stroke-width: 2;
    }
  }

  
  foreignObject {
    overflow: visible;
    line-height: 1.1;
    font-family: Open Sans, sans-serif;
    font-size: 8pt;
  }
  
  p {
    margin: 0;
  }

  .na-node .label-center &gt; div {
    display: table;
    height: 100%;
    width: 100%;
    &amp; &gt; * {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
      padding: 2px;
    }
  }

  .na-surround {
    rect {
      fill: #eeeeee;
      stroke: grey;
      stroke-width: 1.5;
    }
    div {
      padding: 3px;
      font-size: 7pt;
    }
  }


  .legend {
    font-style: italic;
    color: var(--legend);
  }

  path.legend-line {
    stroke: var(--legend)
  }
}

svg.nodearc.spdd-overview.spdd-overview{.flow_start {fill: var(--default-stroke)}}
svg.nodearc.spdd-overview.spdd-overview{.flow_target path {fill: var(--default-stroke)}}svg.nodearc.spdd-overview.spdd-overview .title {
  font-size: 14px;
  text-align: center;
}

svg.nodearc.spdd-overview.spdd-overview .iter-label {
  font-size: 12px;
  font-style: italic;
  font-weight: 600;
  text-align: center;
  color: #975f9c;
}

svg.nodearc.spdd-overview.spdd-overview .business-box {
  fill: #e3f2fd;
  stroke: #1976d2;
}

svg.nodearc.spdd-overview.spdd-overview .prompt-box {
  fill: #fff3e0;
  stroke: #e65100;
  stroke-width: 3;
}

svg.nodearc.spdd-overview.spdd-overview .code-box {
  fill: #e8f5e9;
  stroke: #388e3c;
}

svg.nodearc.spdd-overview.spdd-overview .main-flow {
  stroke: #0f1872;
  stroke-width: 2;
}

svg.nodearc.spdd-overview.spdd-overview .main-flow .end-marker {
  fill: #0f1872;
}

svg.nodearc.spdd-overview.spdd-overview .carry-arc {
  stroke: #e65100;
  stroke-width: 2.5;
  stroke-dasharray: 6 4;
}

svg.nodearc.spdd-overview.spdd-overview .carry-arc .end-marker {
  stroke-dasharray: none;
}

svg.nodearc.spdd-overview.spdd-overview .carry-label {
  font-size: 9px;
  text-align: center;
  color: #e65100;
  font-style: italic;
}

svg.nodearc.spdd-overview.spdd-overview .sync-loop {
  stroke: #e65100;
  stroke-width: 1.5;
  stroke-dasharray: 6 4;
}

svg.nodearc.spdd-overview.spdd-overview .sync-loop .end-marker {
  stroke-dasharray: none;
}

svg.nodearc.spdd-overview.spdd-overview .sync-label {
  font-size: 8px;
  font-style: italic;
  color: #e65100;
}

svg.nodearc.spdd-overview.spdd-overview .arrow-label {
  font-size: 9px;
  font-style: italic;
}
</style>

