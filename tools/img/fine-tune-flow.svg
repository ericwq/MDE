
<svg class = 'nodearc activity' id = '' version = '1.1' viewBox = '-10 -10 700 450' xmlns = 'http://www.w3.org/2000/svg'>
<style>@import url(https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,300,400,600,700,800);

svg.nodearc.activity {
  --default-fill: #F7F8FE;
  --default-stroke: #0f1872;
  --legend: #ef5ba1;
  --dash-stroke: 3,3;
  path {
    stroke: var(--default-stroke);
    fill: none; 
    stroke-width: 1.5;
  }
  .na-node {
    rect, path {
      display: block;
      fill: var(--default-fill);
      stroke: var(--default-stroke);
      stroke-width: 2;
    }
  }

  
  foreignObject {
    overflow: visible;
    line-height: 1.1;
    font-family: Open Sans, sans-serif;
    font-size: 8pt;
  }
  
  p {
    margin: 0;
  }

  .na-node .label-center p {
    display: table;
    height: 100%;
    width: 100%;
    span {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
    }
  }

  .na-surround {
    rect {
      fill: #eeeeee;
      stroke: grey;
      stroke-width: 1.5;
    }
    p {
      padding: 3px;
      font-size: 7pt;
    }
  }


  .legend {
    font-style: italic;
    color: var(--legend);
  }

  path.legend-line {
    stroke: var(--legend)
  }
}
svg.nodearc.activity.activity .na-node rect {rx: 15px}</style>

